<style>
  :root{
    --paper:#f5f6f8; --card:#fff; --ink:#1f2733; --soft:#6b7482;
    --line:#e6e9ef; --done:#2f9e6f; --done-bg:#e8f5ee; --alert:#d0492e;
    --miss:#d0492e; --sun:#c0392b; --sat:#2f6bd0;
    --parent:#3b62c9; --tri:#c98a2f;
    --shadow:0 1px 2px rgba(31,39,51,.05),0 6px 20px rgba(31,39,51,.06);

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

  .daterow-top .date{flex:1}
  .vswitch{display:flex;gap:5px;flex:none}
  .vswitch button{border:1px solid var(--line);background:none;color:var(--soft);font-size:.74rem;font-weight:700;
    padding:3px 11px;border-radius:999px;cursor:pointer;font-family:inherit}
  .vswitch button.active{background:var(--soft);color:#fff;border-color:var(--soft)}

const def=()=>({profiles:{chu:newProfile("中学生",SUBJ_CHU),sho:newProfile("小学生",SUBJ_SHO),kou:newProfile("高校生",SUBJ_CHU)},appealCats:["お手伝い","片付け","掃除","食器洗い"],appealHints:{},spendHints:["おかし","ジュース","ゲーム","本","文ぼうぐ","おもちゃ"],ptYen:{chu:75,sho:50,kou:100},likeYen:5,superYen:100,okoYen:10,bonusPt:30,alertHour:22,notifiedDate:null,updatedAt:0});

function bumpEval(x,kind,delta){
  var tot=(kind==="super")?"supers":"likes", fF=(kind==="super")?"superF":"likeF", fM=(kind==="super")?"superM":"likeM";
  x[tot]=Math.max(0,(x[tot]||0)+delta);
  if(delta>0){
    if(viewer==="father") x[fF]=(x[fF]||0)+1; else if(viewer==="mother") x[fM]=(x[fM]||0)+1;
  }else if(delta<0){
    var mine=(viewer==="father")?fF:fM, other=(viewer==="father")?fM:fF;
    if((x[mine]||0)>0) x[mine]=x[mine]-1;
    else if((x[other]||0)>0) x[other]=x[other]-1;
  }
}
function breakdown(x){
  var sup=isSuper(x), f=sup?(x.superF||0):(x.likeF||0), m=sup?(x.superM||0):(x.likeM||0);

  if(!S.appealHints||typeof S.appealHints!=="object"||Array.isArray(S.appealHints)) S.appealHints={};

function persistLocalOnly(){localStorage.setItem(KEY,JSON.stringify(S));}
function save(){
  if(!applyingRemote){ S.updatedAt=Math.max(Date.now(), (S.updatedAt||0)+1); }
  localStorage.setItem(KEY,JSON.stringify(S));
  if(!applyingRemote && dbRef){
    if(!syncReady){ pendingPush=true; return; }   // 最新を受け取る前は送らない（巻き戻り防止）
    clearTimeout(pushTimer); pushTimer=setTimeout(pushLocal,400);
  }
}

/* ---------- Firebase 同期（任意） ---------- */
const SYNC_KEY="today_check_sync_v1";
let syncCfg=loadSync();          // {code, config} or null
let db=null, dbRef=null, applyingRemote=false, pushTimer=null, syncState="off";
var syncReady=false, pendingPush=false;
function loadSync(){try{return JSON.parse(localStorage.getItem(SYNC_KEY))||null;}catch(e){return null;}}
function saveSync(){localStorage.setItem(SYNC_KEY,JSON.stringify(syncCfg));}
function randCode(){return "fam-"+Math.random().toString(36).slice(2,8)+Math.random().toString(36).slice(2,8);}

function initSync(){
  syncReady=false; pendingPush=false;
  if(!syncCfg||!syncCfg.code||!syncCfg.config){syncState="off";return;}
  if(!window.firebase){syncState="offline";return;}  // SDK未読込（オフライン等）
  try{
    if(!firebase.apps.length) firebase.initializeApp(syncCfg.config);
    db=firebase.database();
    dbRef=db.ref("apps/"+syncCfg.code);
    dbRef.on("value",function(snap){
      const remote=snap.val();
      if(!remote){ syncReady=true; pendingPush=false; pushLocal(); return; }   // クラウドが空→こちらを送る
      if((remote.updatedAt||0) > (S.updatedAt||0) || (!syncReady && pendingPush)){
        // 相手の方が新しい（または同期前に入力していた）→取り込む
        var lost = (!syncReady && pendingPush);
        applyingRemote=true;
        S=Object.assign(def(),remote);
        ensureProfiles();
        persistLocalOnly();
        applyingRemote=false;
        syncReady=true; pendingPush=false;
        render(); renderSubjButtons(); renderMissionHints(); renderTodoList(); renderAppealCats(); renderEffort(); renderAppealHints(); renderAppealList(); renderLedger(); renderWallet(); renderBest(); renderRewards();
        if(lost) toast("最新データに更新しました。入力をやりなおしてね");
      }else{
        syncReady=true;
        if((S.updatedAt||0) > (remote.updatedAt||0) || pendingPush){ pendingPush=false; pushLocal(); }
      }
    },function(){syncState="error";});
    syncState="on";
  }catch(e){syncState="error";}
}
function pushLocal(){
  if(!dbRef) return;
  try{
    dbRef.transaction(function(remote){
      // サーバ側が新しい場合は上書きしない（古い端末の巻き戻り防止）
      if(remote && (remote.updatedAt||0) > (S.updatedAt||0)) return; // undefined＝変更なし
      return S;
    },function(err,committed,snap){
      if(err){ syncState="error"; return; }
      if(!committed){
        // サーバの方が新しかった→こちらが取り込む
        var remote=snap&&snap.val();
        if(remote && (remote.updatedAt||0) > (S.updatedAt||0)){
          applyingRemote=true;
          S=Object.assign(def(),remote);
          ensureProfiles();
          persistLocalOnly();
          applyingRemote=false;
          render(); renderSubjButtons(); renderMissionHints(); renderTodoList(); renderAppealCats(); renderEffort(); renderAppealHints(); renderAppealList(); renderLedger(); renderWallet(); renderBest(); renderRewards();
          toast("新しいデータに更新しました");
        }
      }
    },false);
  }catch(e){}
}

function parseCfg(text){
  var t=(text||"").trim().replace(/^const\s+firebaseConfig\s*=\s*/,"").replace(/;\s*$/,"");
  try{ return JSON.parse(t); }catch(e){}
  try{ return (new Function("return ("+t+")"))(); }catch(e){}
  return null;
}
function connectSync(codeVal,configText){
  var cfg=parseCfg(configText);
  if(!cfg||!cfg.apiKey){ toast("設定を読み取れません。{ から } までを貼り付けてください"); return; }
  if(!cfg.databaseURL){ toast("databaseURL がありません。先にRealtime Databaseを作成してください"); return; }
  const code=(codeVal||"").trim()||randCode();
  syncCfg={code:code,config:cfg}; saveSync();
  toast("接続を試みています…");
  initSync();
  setTimeout(function(){ toast(syncState==="on"?"同期を開始しました":"接続できませんでした。設定を確認してください"); closeModal(); },800);
}
function syncBundle(){ return syncCfg?btoa(unescape(encodeURIComponent(JSON.stringify(syncCfg)))):""; }
function copySyncBundle(){ const t=syncBundle(); if(!t){toast("先に同期を設定してください");return;}
  if(navigator.clipboard){navigator.clipboard.writeText(t).then(function(){toast("同期コードをコピーしました");},function(){prompt("コピーしてください",t);});}
  else{prompt("コピーしてください",t);} }
function applyBundle(str){
  try{ syncCfg=JSON.parse(decodeURIComponent(escape(atob(str.trim())))); saveSync(); initSync();
    toast(syncState==="on"?"同期を開始しました":"設定を保存しました"); closeModal(); }
  catch(e){ toast("同期コードが読み取れません"); }
}
function disconnectSync(){
  if(dbRef){try{dbRef.off();}catch(e){}}
  dbRef=null; syncCfg=null; localStorage.removeItem(SYNC_KEY); syncState="off";
  toast("同期を解除しました"); closeModal();
}

function ymd(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function parseYmd(s){const p=s.split("-");return new Date(+p[0],+p[1]-1,+p[2]);}
const key=()=>ymd(new Date());
function day(){if(!cur().days[key()])cur().days[key()]={checked:{},checkedAt:{},memo:"",total:0,done:0,parentConfirmed:false,parentAt:null};const d=cur().days[key()];d.checked=d.checked||{};d.checkedAt=d.checkedAt||{};if(d.parentConfirmed===undefined)d.parentConfirmed=false;return d;}
function uid(){return Math.random().toString(36).slice(2,8);}
function esc(s){return String(s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}

/* タスクが「あり」か（既定=あり） */
function appOf(rec,id){ return !(rec.applicable && rec.applicable[id]===false); }
/* チェック日時を短く整形（当日はHH:MM、他日はM/D HH:MM） */
function fmtTime(ts){
  if(!ts) return "";
  const d=new Date(ts), now=new Date();
  const hm=d.getHours()+":"+String(d.getMinutes()).padStart(2,"0");
  return d.toDateString()===now.toDateString()?hm:((d.getMonth()+1)+"/"+d.getDate()+" "+hm);
}
/* 今日のチェックリスト行：編集モードで「あり/なしスライドを出す項目か」を設定 */
function taskApp(rec,t){ return (t.avail===false)?true:appOf(rec,t.id); }
function checklistRow(d,t,edit){
  var hasSlide=(t.avail!==false);

/* 今日ぶんの done/total を保存（カレンダー判定用にスナップショット） */
function updateTodayStatus(){
  const d=day();
  const apps=cur().tasks.filter(function(t){return taskApp(d,t);});
  d.total=apps.length;
  d.done=apps.filter(function(t){return d.checked[t.id];}).length;
  d.allDone=cur().tasks.length>0 && d.done===d.total;
}
function hasInput(){const d=cur().days[key()];if(!d)return false;
  return Object.values(d.checked).some(Boolean)||(d.memos&&d.memos.length>0)||(d.memo||"").trim().length>0;}

/* 日付ごとの記録判定: 'o'(完了+確認) / 't'(完了・確認まち) / 'x'(やり残し) / '' */
function hasActivity(rec){
  if(!rec) return false;
  if(rec.parentConfirmed) return true;
  if(rec.checked && Object.values(rec.checked).some(Boolean)) return true;
  if(rec.applicable && Object.values(rec.applicable).some(function(v){return v===false;})) return true;
  return false;
}
function recStatus(rec,isPast){
  if(!rec) return "";
  const allDone=(rec.allDone!==undefined)?rec.allDone:(rec.total>0&&rec.done===rec.total);
  if(allDone && rec.parentConfirmed) return "o";
  if(allDone && !rec.parentConfirmed) return "t";
  if(isPast && hasActivity(rec)) return "x";  // 開いただけの空の日は×にしない
  return "";
}
function statusOf(dateStr,isPast){ return recStatus(cur().days[dateStr],isPast); }

/* ---- ポイント制（◯で加算・連続でレートUP・×でリセット・月清算） ---- */
function ptRound(x){return Math.round(x*10)/10;}
function likesForMonth(profileKey,y,m){
  const p=S.profiles[profileKey]; if(!p) return 0;
  const ms=ymd(new Date(y,m,1)), me=ymd(new Date(y,m+1,0));
  let n=0;
  (p.appeals||[]).forEach(function(a){ if(a.day>=ms&&a.day<=me) n+=(a.likes||0); });
  (p.todos||[]).forEach(function(t){ if(t.done&&t.doneAt){ var dk=ymd(new Date(t.doneAt)); if(dk>=ms&&dk<=me) n+=(t.likes||0); } });
  return n;
}
function evalForMonth(profileKey,y,m){
  const p=S.profiles[profileKey]; if(!p) return {likes:0,supers:0};
  const ms=ymd(new Date(y,m,1)), me=ymd(new Date(y,m+1,0));
  let likes=0, supers=0;
  function acc(x){ if(isSuper(x)) supers+=(x.supers||0); else likes+=(x.likes||0); }
  (p.appeals||[]).forEach(function(a){ if(a.day>=ms&&a.day<=me) acc(a); });
  (p.todos||[]).forEach(function(t){ if(t.done&&t.doneAt){ var dk=ymd(new Date(t.doneAt)); if(dk>=ms&&dk<=me) acc(t); } });
  return {likes:likes,supers:supers};
}
function supersOnDay(dstr){
  const p=cur(); let n=0;
  (p.appeals||[]).forEach(function(a){ if(a.day===dstr && isSuper(a)) n+=(a.supers||0); });
  (p.todos||[]).forEach(function(t){ if(t.done&&t.doneAt&&ymd(new Date(t.doneAt))===dstr && isSuper(t)) n+=(t.supers||0); });
  return n;
}
function okosOnDay(dstr){
  const p=cur(); let n=0;
  (p.okos||[]).forEach(function(o){ if(o.date===dstr) n+=(o.count||1); });
  return n;
}
function likesOnDay(dstr){
  const p=cur(); let n=0;
  (p.appeals||[]).forEach(function(a){ if(a.day===dstr && !isSuper(a)) n+=(a.likes||0); });
  (p.todos||[]).forEach(function(t){ if(t.done&&t.doneAt&&ymd(new Date(t.doneAt))===dstr && !isSuper(t)) n+=(t.likes||0); });
  return n;
}
function pointsByDay(profileKey,y,m){
  const p=S.profiles[profileKey]; const map={}, bonus={};
  if(!p) return {map:map,bonus:bonus};
  const today=key(), monthEnd=ymd(new Date(y,m+1,0));
  const keys=Object.keys(p.days).sort();
  let rate=1.0, streak=0; const B=S.bonusPt||0;
  keys.forEach(function(k){
    if(k>monthEnd) return;
    const st=recStatus(p.days[k], k<today);
    if(st==="o"){ map[k]=rate; rate=Math.min(2.0, ptRound(rate+0.1)); streak++;
      if(B>0 && streak%30===0) bonus[k]=B; }
    else if(st==="x"){ rate=1.0; streak=0; }
  });
  return {map:map,bonus:bonus};
}
function pointsStats(profileKey,y,m){
  const p=S.profiles[profileKey]; if(!p) return {points:0,rate:1,todayRate:1,streak:0,bonus:0};
  const today=key();
  const monthStart=ymd(new Date(y,m,1)), monthEnd=ymd(new Date(y,m+1,0));
  const keys=Object.keys(p.days).sort();
  let rate=1.0, monthPts=0, monthBonus=0, streak=0, todayRate=null; const B=S.bonusPt||0;
  keys.forEach(function(k){
    if(k>monthEnd) return;
    if(k===today) todayRate=rate;               // 今日の◯が得るレート（進める前に記録）
    const st=recStatus(p.days[k], k<today);
    const inMonth = (k>=monthStart && k<=monthEnd);
    if(st==="o"){
      if(inMonth) monthPts+=rate;
      rate=Math.min(2.0, ptRound(rate+0.1));
      streak++;
      if(B>0 && streak%30===0 && inMonth){ monthPts+=B; monthBonus+=B; }
    }else if(st==="x"){ rate=1.0; streak=0; }
  });
  if(todayRate===null) todayRate=rate;          // 今日まだ記録なし→現在レートが適用
  return {points:ptRound(monthPts), rate:rate, todayRate:todayRate, streak:streak, bonus:monthBonus};
}

/* ---- おこづかい帳 ---- */
function okoForMonth(pk,y,m){
  var p=S.profiles[pk]; if(!p) return 0;
  var ms=ymd(new Date(y,m,1)), me=ymd(new Date(y,m+1,0)), n=0;
  (p.okos||[]).forEach(function(o){ if(o.date>=ms&&o.date<=me) n+=(o.count||1); });
  return n;
}
function monthReward(pk,y,m){
  var st=pointsStats(pk,y,m), ev=evalForMonth(pk,y,m), per=(S.ptYen&&S.ptYen[pk])||50;
  var gross=Math.round(st.points*per)+ev.likes*S.likeYen+ev.supers*S.superYen;
  return Math.max(0, gross - okoForMonth(pk,y,m)*(S.okoYen||0));
}
function settleMonths(){
  var curM=key().slice(0,7), changed=false;
  Object.keys(S.profiles).forEach(function(pk){
    var p=S.profiles[pk]; p.ledger=p.ledger||[]; p.settled=p.settled||{};
    var months={};
    Object.keys(p.days||{}).forEach(function(k){ months[k.slice(0,7)]=true; });
    (p.appeals||[]).forEach(function(a){ if(a.day) months[a.day.slice(0,7)]=true; });
    (p.todos||[]).forEach(function(t){ if(t.doneAt) months[ymd(new Date(t.doneAt)).slice(0,7)]=true; });
    Object.keys(months).forEach(function(mk){
      if(mk>=curM || p.settled[mk]) return;
      var pt=mk.split("-"), y=+pt[0], m=+pt[1]-1;
      var amt=monthReward(pk,y,m);
      p.settled[mk]=true; changed=true;
      if(amt>0) p.ledger.push({id:uid(),date:ymd(new Date(y,m+1,1)),at:Date.now(),comment:(m+1)+"月ぶんのこづかい",amount:amt,cat:"allowance",given:false});
    });
  });
  if(changed) save();
}
function ledgerCat(e){ if(e.cat) return e.cat; if(e.type==="reward"||e.auto) return "allowance"; if(e.type==="advance") return "advance"; return "extra"; }
function addManual(cat){
  if(!isParent()){ toast("父か母を選んでね"); return; }
  var c=document.getElementById("ledgerComment").value.trim();
  var amt=parseInt(document.getElementById("ledgerAmount").value,10);
  var dt=document.getElementById("ledgerDate").value || key();
  if(isNaN(amt)||amt<=0){ toast("金額を入れてください"); return; }
  cur().ledger=cur().ledger||[];
  var e={id:uid(),date:dt,at:Date.now(),comment:c||(cat==="advance"?"前借り":"ボーナス"),amount:amt,cat:cat};
  if(cat==="advance") e.returned=false;
  cur().ledger.push(e);
  document.getElementById("ledgerComment").value=""; document.getElementById("ledgerAmount").value="";
  save(); renderLedger(); renderWallet(); toast("記録しました");
}

/* ---- おさいふ（所持金） ---- */
function walletMovements(pk){
  var p=S.profiles[pk]||{}, out=[];
  (p.ledger||[]).forEach(function(e){
    var c=ledgerCat(e);
    if(c==="allowance"){ if(e.given) out.push({date:e.givenAt?ymd(new Date(e.givenAt)):e.date, at:e.givenAt||e.at, sign:1, amount:e.amount, label:e.comment||"こづかい", tag:e.reward?"ごほうび":"こづかい"}); }
    else if(c==="advance"){
      out.push({date:e.date, at:e.at, sign:1, amount:e.amount, label:e.comment||"前借り", tag:"前借り"});
      if(e.returned) out.push({date:e.returnedAt?ymd(new Date(e.returnedAt)):e.date, at:e.returnedAt||e.at, sign:-1, amount:e.amount, label:"前借りを返した", tag:"返済"});
    }
    else out.push({date:e.date, at:e.at, sign:1, amount:e.amount, label:e.comment||"ボーナス", tag:"ボーナス"});
  });
  (p.spends||[]).forEach(function(s){ out.push({date:s.date, at:s.at, sign:-1, amount:s.amount, label:s.comment||"つかった", tag:"つかった", spendId:s.id}); });
  return out;
}
function walletBalance(pk){
  var net=walletMovements(pk).reduce(function(a,m){return a+m.sign*m.amount;},0);
  return net+((S.profiles[pk]||{}).walletAdj||0);
}

function renderCalendar(){
  const y=calView.getFullYear(),m=calView.getMonth();
  document.getElementById("calTitle").textContent=y+"年"+(m+1)+"月";
  const todayStr=key();
  const first=new Date(y,m,1), startWd=first.getDay();
  const days=new Date(y,m+1,0).getDate();

  let wd='';["日","月","火","水","木","金","土"].forEach(function(w,i){
    wd+='<div class="cal-wd '+(i===0?'s':i===6?'b':'')+'">'+w+'</div>';});

  let cells="";
  for(let i=0;i<startWd;i++) cells+='<div class="cal-cell empty"></div>';
  let oCount=0,tCount=0,xCount=0;
  const pd=pointsByDay(activeProfile,y,m); const ptMap=pd.map, bonusMap=pd.bonus;
  for(let dd=1;dd<=days;dd++){
    const dstr=ymd(new Date(y,m,dd));
    const isToday=dstr===todayStr;
    const isPast=dstr<todayStr;
    const st=statusOf(dstr,isPast);
    if(st==="o")oCount++; else if(st==="t")tCount++; else if(st==="x")xCount++;
    const mark=st==="o"?'<span class="cal-mark o">◯</span>':st==="t"?'<span class="cal-mark t">△</span>':st==="x"?'<span class="cal-mark x">×</span>':'';
    const dueN=(cur().todos||[]).filter(function(x){return !x.done && x.due===dstr;}).length;
    let dueDot="";
    if(dueN){ const cls=dstr<todayStr?"over":(dstr===todayStr?"today":"up"); dueDot='<span class="cal-due '+cls+'"></span>'; }
    const editable=dstr<=todayStr;
    const lk=likesOnDay(dstr);
    const earned=ptMap[dstr];
    var foot="";
    if(earned!==undefined) foot+='<span class="pt">'+earned.toFixed(1)+'</span>';
    if(bonusMap[dstr]) foot+='<span class="pt">🎁</span>';
    if(lk>0) foot+='<span class="lk">👍'+lk+'</span>';
    var sp=supersOnDay(dstr);
    if(sp>0) foot+='<span class="lk">🏆'+sp+'</span>';
    var ok=okosOnDay(dstr);
    if(ok>0) foot+='<span class="oko">😠'+ok+'</span>';
    if(foot) foot='<span class="cal-foot">'+foot+'</span>';
    cells+='<div class="cal-cell '+(isToday?'today ':'')+(editable?'editable':'')+'"'
      +(editable?(' onclick="openDayEditor(\''+dstr+'\')"'):'')
      +'><span class="dnum">'+dd+'</span>'+dueDot+mark+foot+'</div>';
  }
  document.getElementById("calGrid").innerHTML=wd+cells;
  document.getElementById("calTally").innerHTML=
    '<span class="o">◯ '+oCount+'日</span><span class="t">△ '+tCount+'日</span><span class="x">× '+xCount+'日</span>';
  renderPoints();
}

        var dt=parseYmd(k);
        var rows=groups[k].sort(function(a,b){return (b.doneAt||0)-(a.doneAt||0);}).map(todoDoneRow).join("");
        h+='<div class="card"><div class="listhead">'+(dt.getMonth()+1)+'/'+(dt.getDate())+'（'+WD[dt.getDay()]+'）</div>'+rows+'</div>';
      });
    }
  }
  el.innerHTML=h;
}
function toggleTodo(id){
  const x=(cur().todos||[]).find(function(t){return t.id===id;}); if(!x)return;
  x.done=!x.done; x.doneAt=x.done?Date.now():null; save();
  renderTodoList(); renderDueSoon(); renderDoneToday(); renderCalendar();
}
function delTodo(id){
  askConfirm("削除しますか？",function(){
    cur().todos=(cur().todos||[]).filter(function(t){return t.id!==id;}); save();
    renderTodoList(); renderDueSoon(); renderDoneToday(); renderCalendar();
  });
}
/* 今日タブ：今日やったこと（当日完了の登録タスク）を親の確認用に残す */
function renderDoneToday(){
  const box=document.getElementById("doneTodayBox"); if(!box)return;
  const tk=key();
  const done=(cur().todos||[]).filter(function(x){return x.done && x.doneAt && ymd(new Date(x.doneAt))===tk;})
    .sort(function(a,b){return (b.doneAt||0)-(a.doneAt||0);});
  if(!done.length){ box.innerHTML=""; return; }
  const head='<div style="display:flex;align-items:center">'
    +'<div class="listhead" style="color:var(--done);cursor:pointer;flex:1" onclick="toggleDoneToday()">✅ 今日やったこと（'+done.length+'） '+(showDoneToday?'▾':'▸')+'</div>'
    +((showDoneToday&&isParent())?'<button class="slidesw'+(gearDone?' on':'')+'" onclick="toggleGearDone()"><span class="track"><span class="knob"></span></span></button>':'')
    +'</div>';
  var note=(showDoneToday&&gearDone)?'<div class="d" style="padding:0 4px 8px">項目ごとに 👍いいね / 🏆すごいね を選べます</div>':'';
  box.innerHTML='<div class="card">'+head+note+(showDoneToday?done.map(todoRow).join(""):'')+'</div>';
}
/* 今日タブ：期限が来ている／近いやることを表示（毎日チェックへの橋渡し） */
function renderDueSoon(){
  const box=document.getElementById("dueBox"); if(!box)return;
  const tomo=new Date(); tomo.setDate(tomo.getDate()+1); const tomoKey=ymd(tomo);
  const due=(cur().todos||[]).filter(function(x){return !x.done && x.due && x.due<=tomoKey;}).sort(sortByDue);
  if(!due.length){ box.innerHTML=""; return; }
  box.innerHTML='<div class="card duecard"><div class="listhead" style="color:var(--miss)">⏰ 期限が近いやること（'+due.length+'）</div>'
    +due.map(todoRow).join("")+'</div>';
}


function setTab(t){
  tab=t; gearDone=false; gearAppeal=false; resetTagEdit();
  document.getElementById("tabToday").style.display = t==="today"?"":"none";
  document.getElementById("tabCal").style.display = t==="cal"?"":"none";
  document.getElementById("tabAdd").style.display = t==="add"?"":"none";
  document.getElementById("tabAppeal").style.display = t==="appeal"?"":"none";
  document.getElementById("tabMoney").style.display = t==="money"?"":"none";
  var btns=document.querySelectorAll("nav.tabs button");
  for(var i=0;i<btns.length;i++){ btns[i].classList.toggle("active", btns[i].getAttribute("data-tab")===t); }
  if(t==="cal"){ renderCalendar(); renderPoints(); renderBest(); renderRewards(); }
  if(t==="money"){ renderWallet(); renderLedger(); }
  if(t==="add"){ renderSubjButtons(); renderMissionHints(); renderTodoList(); }
  if(t==="appeal"){ renderAppealCats(); renderEffort(); renderAppealHints(); renderAppealList(); }
  window.scrollTo(0,0);
}
document.getElementById("prevM").onclick=function(){calView.setMonth(calView.getMonth()-1);renderCalendar();};
document.getElementById("nextM").onclick=function(){calView.setMonth(calView.getMonth()+1);renderCalendar();};
settleMonths();
render();
renderViewerSwitch();
renderLedger();
renderWallet();
renderBest();
renderRewards();
renderSubjButtons();
renderTodoList();
renderMissionHints();
renderAppealCats();
renderEffort();
renderAppealHints();
renderAppealList();
initSync();
</script>
