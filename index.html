<style>
  :root{
    --paper:#f5f6f8; --card:#fff; --ink:#1f2733; --soft:#6b7482;
    --line:#e6e9ef; --done:#2f9e6f; --done-bg:#e8f5ee; --alert:#d0492e;
    --miss:#d0492e; --sun:#c0392b; --sat:#2f6bd0;
    --shadow:0 1px 2px rgba(31,39,51,.05),0 6px 20px rgba(31,39,51,.06);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;padding:0 0 60px;background:var(--paper);color:var(--ink);
    font-family:"Hiragino Sans","Noto Sans JP","Yu Gothic UI",system-ui,sans-serif;line-height:1.6}
  .wrap{max-width:520px;margin:0 auto;padding:0 16px}

  header{position:sticky;top:0;background:var(--paper);padding:18px 0 10px;z-index:5}
  .date{font-size:1.5rem;font-weight:800}
  .sub{font-size:.82rem;color:var(--soft);font-weight:600}
  .gear{float:right;border:none;background:none;font-size:1.3rem;color:var(--soft);cursor:pointer;padding:4px}

  .alert{display:none;background:#fdecea;border:1px solid #f3c6bd;color:var(--alert);
    border-radius:14px;padding:12px 14px;margin-bottom:14px;font-weight:700;font-size:.92rem}
  .alert.show{display:block}

  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;
    box-shadow:var(--shadow);overflow:hidden;margin-bottom:16px}

  .task{display:flex;align-items:center;gap:14px;padding:16px 16px}
  .task + .task{border-top:1px solid var(--line)}
  .circle{width:44px;height:44px;flex:none;border:2.5px solid #cdd4de;border-radius:50%;
    display:grid;place-items:center;cursor:pointer;background:#fff;font-size:1.4rem;
    transition:transform .1s,background .12s,border-color .12s}
  .circle:active{transform:scale(.9)}
  .task.on .circle{background:var(--done-bg);border-color:var(--done)}
  .task .name{flex:1;font-size:1.1rem;font-weight:700}
  .task.on .name{color:var(--soft)}
  .task .del{border:none;background:none;color:#cdd4de;font-size:1.3rem;cursor:pointer;padding:2px 6px}
  .task .del:hover{color:#d05656}

  .addrow{display:flex;gap:8px;padding:12px 14px;border-top:1px solid var(--line);background:#fafbfc}
  .addrow input{flex:1;border:1.5px solid var(--line);border-radius:10px;padding:10px 12px;
    font-family:inherit;font-size:1rem;min-width:0}
  .addrow input:focus{outline:none;border-color:var(--done)}
  .addrow button{border:none;background:var(--ink);color:#fff;font-weight:700;font-family:inherit;
    border-radius:10px;padding:0 18px;cursor:pointer;font-size:1rem}

  .memo-label{font-size:.85rem;font-weight:700;color:var(--soft);padding:14px 16px 4px}
  textarea{width:100%;border:none;padding:0 16px 16px;font-family:inherit;font-size:1rem;
    resize:vertical;min-height:90px;background:transparent}
  textarea:focus{outline:none}

  /* calendar */
  .cal-head{display:flex;align-items:center;justify-content:center;gap:18px;padding:14px 12px 6px}
  .cal-head button{border:none;background:none;font-size:1.3rem;color:var(--soft);cursor:pointer;padding:2px 10px}
  .cal-title{font-weight:800;font-size:1.05rem;min-width:120px;text-align:center}
  .cal-tally{display:flex;justify-content:center;gap:16px;font-size:.82rem;font-weight:700;padding:0 0 8px}
  .cal-tally .o{color:var(--done)} .cal-tally .x{color:var(--miss)}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;padding:0 10px 14px}
  .cal-wd{text-align:center;font-size:.72rem;font-weight:700;color:var(--soft);padding:4px 0}
  .cal-wd.s{color:var(--sun)} .cal-wd.b{color:var(--sat)}
  .cal-cell{aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;align-items:center;
    justify-content:center;position:relative;background:#fafbfc}
  .cal-cell.empty{background:transparent}
  .cal-cell .dnum{position:absolute;top:4px;left:6px;font-size:.62rem;color:var(--soft);font-weight:600}
  .cal-cell.today{outline:2px solid var(--ink);outline-offset:-2px}
  .cal-mark{font-size:1.25rem;line-height:1;margin-top:6px}
  .cal-mark.o{color:var(--done)} .cal-mark.x{color:var(--miss)}
  .cal-note{font-size:.75rem;color:var(--soft);padding:0 16px 14px;text-align:center}

  .notice{font-size:.8rem;color:var(--soft);text-align:center;margin:4px 0 14px}
  .notice a{color:var(--done);cursor:pointer;font-weight:700;text-decoration:underline}

  .backdrop{position:fixed;inset:0;background:rgba(31,39,51,.4);display:none;z-index:50;
    align-items:flex-end;justify-content:center}
  .backdrop.open{display:flex}
  .modal{background:#fff;width:100%;max-width:520px;border-radius:20px 20px 0 0;padding:22px 18px 30px}
  .modal h2{margin:0 0 14px;font-size:1.15rem}
  .row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 0;border-bottom:1px solid var(--line)}
  .row .t{font-weight:700;font-size:.95rem}
  .row .d{font-size:.78rem;color:var(--soft)}
  .timebox{border:1.5px solid var(--line);border-radius:10px;padding:8px;font-size:1rem;font-family:inherit}
  .btn-line{width:100%;border:1.5px solid var(--line);background:#fff;border-radius:10px;padding:12px;
    font-family:inherit;font-weight:700;font-size:.92rem;margin-top:12px;cursor:pointer;color:var(--ink)}
  .btn-line.danger{color:#c0392b;border-color:#f0d5d0}
  .toast{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;
    padding:10px 18px;border-radius:999px;font-size:.88rem;font-weight:700;opacity:0;transition:.25s;z-index:60}
  .toast.show{opacity:1;bottom:52px}
</style>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
</head>
<body>
<div class="wrap">
  <header>
    <button class="gear" id="gear">&#9881;&#65038;</button>
    <div class="date" id="date">&mdash;</div>
    <div class="sub" id="sub"></div>
  </header>

  <div class="alert" id="alert"></div>

  <div class="card">
    <div id="tasks"></div>
    <div class="addrow">
      <input id="taskIn" placeholder="チェックしたいことを追加" maxlength="30">
      <button id="addBtn">追加</button>
    </div>
  </div>

  <div class="card">
    <div class="memo-label">メモ（自由に）</div>
    <textarea id="memo" placeholder="連絡・気づいたこと・先生に言われたこと など"></textarea>
  </div>

  <div class="card">
    <div class="cal-head">
      <button id="prevM">&lsaquo;</button>
      <div class="cal-title" id="calTitle"></div>
      <button id="nextM">&rsaquo;</button>
    </div>
    <div class="cal-tally" id="calTally"></div>
    <div class="cal-grid" id="calGrid"></div>
    <div class="cal-note">◯＝ぜんぶ完了　×＝やり残し　空欄＝未記録</div>
  </div>

  <div class="notice" id="notice"></div>
</div>

<div class="backdrop" id="backdrop"><div class="modal" id="modal"></div></div>
<div class="toast" id="toast"></div>

<script>
const KEY="today_check_v1";
const WD=["日","月","火","水","木","金","土"];
const def=()=>({tasks:[{id:"p",name:"出すプリント"},{id:"h",name:"宿題"}],days:{},alertHour:22,notifiedDate:null,updatedAt:0});
let S=load();
let calView=new Date(); calView.setDate(1);

function load(){try{const r=JSON.parse(localStorage.getItem(KEY));return r?Object.assign(def(),r):def();}catch(e){return def();}}
function persistLocalOnly(){localStorage.setItem(KEY,JSON.stringify(S));}
function save(){
  if(!applyingRemote){ S.updatedAt=Date.now(); }
  localStorage.setItem(KEY,JSON.stringify(S));
  if(!applyingRemote && dbRef){ clearTimeout(pushTimer); pushTimer=setTimeout(pushLocal,400); }
}

/* ---------- Firebase 同期（任意） ---------- */
const SYNC_KEY="today_check_sync_v1";
let syncCfg=loadSync();          // {code, config} or null
let db=null, dbRef=null, applyingRemote=false, pushTimer=null, syncState="off";
function loadSync(){try{return JSON.parse(localStorage.getItem(SYNC_KEY))||null;}catch(e){return null;}}
function saveSync(){localStorage.setItem(SYNC_KEY,JSON.stringify(syncCfg));}
function randCode(){return "fam-"+Math.random().toString(36).slice(2,8)+Math.random().toString(36).slice(2,8);}

function initSync(){
  if(!syncCfg||!syncCfg.code||!syncCfg.config){syncState="off";return;}
  if(!window.firebase){syncState="offline";return;}  // SDK未読込（オフライン等）
  try{
    if(!firebase.apps.length) firebase.initializeApp(syncCfg.config);
    db=firebase.database();
    dbRef=db.ref("apps/"+syncCfg.code);
    dbRef.on("value",function(snap){
      const remote=snap.val();
      if(!remote){ pushLocal(); return; }                 // クラウドが空→こちらを送る
      if((remote.updatedAt||0) > (S.updatedAt||0)){        // 相手の方が新しい→取り込む
        applyingRemote=true;
        S=Object.assign(def(),remote);
        persistLocalOnly();
        applyingRemote=false;
        render();
      }else if((S.updatedAt||0) > (remote.updatedAt||0)){  // こちらが新しい→送る
        pushLocal();
      }
    },function(){syncState="error";});
    syncState="on";
  }catch(e){syncState="error";}
}
function pushLocal(){ if(dbRef){ try{dbRef.set(S);}catch(e){} } }

function connectSync(codeVal,configText){
  let cfg;
  try{ cfg=JSON.parse(configText); }catch(e){ toast("設定の形式が正しくありません"); return; }
  const code=(codeVal||"").trim()||randCode();
  syncCfg={code:code,config:cfg}; saveSync();
  toast("接続を試みています…");
  initSync();
  setTimeout(function(){ toast(syncState==="on"?"同期を開始しました":"接続できませんでした。設定を確認してください"); closeModal(); },800);
}
function syncBundle(){ return syncCfg?btoa(unescape(encodeURIComponent(JSON.stringify(syncCfg)))):""; }
function copySyncBundle(){ const t=syncBundle(); if(!t){toast("先に同期を設定してください");return;}
  if(navigator.clipboard){navigator.clipboard.writeText(t).then(function(){toast("同期コードをコピーしました");},function(){prompt("コピーしてください",t);});}
  else{prompt("コピーしてください",t);} }
function applyBundle(str){
  try{ syncCfg=JSON.parse(decodeURIComponent(escape(atob(str.trim())))); saveSync(); initSync();
    toast(syncState==="on"?"同期を開始しました":"設定を保存しました"); closeModal(); }
  catch(e){ toast("同期コードが読み取れません"); }
}
function disconnectSync(){
  if(dbRef){try{dbRef.off();}catch(e){}}
  dbRef=null; syncCfg=null; localStorage.removeItem(SYNC_KEY); syncState="off";
  toast("同期を解除しました"); closeModal();
}

function ymd(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
const key=()=>ymd(new Date());
function day(){if(!S.days[key()])S.days[key()]={checked:{},memo:"",total:0,done:0};const d=S.days[key()];d.checked=d.checked||{};return d;}
const uid=()=>Math.random().toString(36).slice(2,8);
function esc(s){return String(s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}

/* 今日ぶんの done/total を保存（カレンダー判定用にスナップショット） */
function updateTodayStatus(){
  const d=day();
  d.total=S.tasks.length;
  d.done=S.tasks.filter(function(t){return d.checked[t.id];}).length;
}
function hasInput(){const d=S.days[key()];if(!d)return false;
  return Object.values(d.checked).some(Boolean)||(d.memo||"").trim().length>0;}

/* 日付ごとの記録判定: 'o' / 'x' / '' */
function statusOf(dateStr,isPast){
  const rec=S.days[dateStr];
  if(rec && rec.total>0 && rec.done===rec.total) return "o";
  if(isPast && rec && rec.total>0) return "x";   // 使ったのにやり残し
  return "";                                     // 未記録
}

function render(){
  updateTodayStatus(); persistLocalOnly();
  const now=new Date();
  document.getElementById("date").textContent=(now.getMonth()+1)+"月"+now.getDate()+"日（"+WD[now.getDay()]+"）";
  const d=day();
  const done=S.tasks.filter(function(t){return d.checked[t.id];}).length;
  document.getElementById("sub").textContent=S.tasks.length?(done+" / "+S.tasks.length+" 確認ずみ"):"項目を追加してください";

  document.getElementById("tasks").innerHTML=S.tasks.map(function(t){
    const on=d.checked[t.id];
    return '<div class="task '+(on?'on':'')+'">'
      +'<div class="circle" onclick="toggle(\''+t.id+'\')">'+(on?'⭕️':'')+'</div>'
      +'<div class="name">'+esc(t.name)+'</div>'
      +'<button class="del" onclick="delTask(\''+t.id+'\')">×</button></div>';
  }).join("")||'<div class="task"><div class="name" style="color:var(--soft)">まだありません</div></div>';

  document.getElementById("memo").value=d.memo||"";
  renderCalendar();
  document.getElementById("notice").innerHTML=
    (window.Notification&&Notification.permission==="granted")
      ? ("毎日 "+S.alertHour+":00 までに入力がないとお知らせします")
      : ('<a onclick="askNotif()">'+S.alertHour+':00 のお知らせを有効にする</a>');
  checkAlert();
}

function renderCalendar(){
  const y=calView.getFullYear(),m=calView.getMonth();
  document.getElementById("calTitle").textContent=y+"年"+(m+1)+"月";
  const todayStr=key();
  const first=new Date(y,m,1), startWd=first.getDay();
  const days=new Date(y,m+1,0).getDate();

  let wd='';["日","月","火","水","木","金","土"].forEach(function(w,i){
    wd+='<div class="cal-wd '+(i===0?'s':i===6?'b':'')+'">'+w+'</div>';});

  let cells="";
  for(let i=0;i<startWd;i++) cells+='<div class="cal-cell empty"></div>';
  let oCount=0,xCount=0;
  for(let dd=1;dd<=days;dd++){
    const dstr=ymd(new Date(y,m,dd));
    const isToday=dstr===todayStr;
    const isPast=dstr<todayStr;
    const st=statusOf(dstr,isPast);
    if(st==="o")oCount++; if(st==="x")xCount++;
    const mark=st==="o"?'<span class="cal-mark o">◯</span>':st==="x"?'<span class="cal-mark x">×</span>':'';
    cells+='<div class="cal-cell '+(isToday?'today':'')+'"><span class="dnum">'+dd+'</span>'+mark+'</div>';
  }
  document.getElementById("calGrid").innerHTML=wd+cells;
  document.getElementById("calTally").innerHTML=
    '<span class="o">◯ '+oCount+'日</span><span class="x">× '+xCount+'日</span>';
}

function toggle(id){const d=day();d.checked[id]=!d.checked[id];updateTodayStatus();save();render();}
function addTask(){const i=document.getElementById("taskIn");const v=i.value.trim();if(!v)return;
  S.tasks.push({id:uid(),name:v});i.value="";save();render();}
function delTask(id){if(!confirm("この項目を消しますか？"))return;
  S.tasks=S.tasks.filter(function(t){return t.id!==id;});save();render();}
function saveMemo(v){day().memo=v;save();}

function checkAlert(){
  const now=new Date();
  const el=document.getElementById("alert");
  if(now.getHours()>=S.alertHour && !hasInput()){
    el.textContent="⏰ まだ今日のチェックが入っていません。プリント・宿題を確認しよう。";
    el.classList.add("show");
    if(window.Notification&&Notification.permission==="granted"&&S.notifiedDate!==key()){
      try{new Notification("今日のチェック",{body:"まだ入力がありません。プリント・宿題を確認しよう。"});}catch(e){}
      S.notifiedDate=key();save();
    }
  }else{ el.classList.remove("show"); }
}
function askNotif(){
  if(!("Notification" in window)){toast("この端末は通知に対応していません");return;}
  Notification.requestPermission().then(function(p){if(p==="granted")toast("お知らせを有効にしました");render();});
}
setInterval(checkAlert,30000);

function openSettings(){
  const bd=document.getElementById("backdrop"),m=document.getElementById("modal");
  m.innerHTML='<h2>設定</h2>'
    +'<div class="row"><div><div class="t">お知らせの時刻</div><div class="d">この時刻までに入力がないとアラート</div></div>'
    +'<input type="time" class="timebox" id="alertTime" value="'+String(S.alertHour).padStart(2,"0")+':00"></div>'
    +'<div style="margin-top:18px;font-weight:800;font-size:1rem">端末どうしの同期（Firebase）</div>'
    +'<div class="d" style="margin:2px 0 8px">同じ家族コードにした端末どうしで記録を共有します。ステータス：<b>'
      +({on:"同期中 ✓",off:"未接続",offline:"オフライン",error:"接続エラー"}[syncState]||"未接続")+'</b></div>'
    +'<div class="d" style="margin-bottom:4px">家族コード（空なら自動作成）</div>'
    +'<input class="timebox" id="syncCode" style="width:100%;margin-bottom:8px" placeholder="fam-xxxxxxxx" value="'+esc(syncCfg?syncCfg.code:"")+'">'
    +'<div class="d" style="margin-bottom:4px">Firebase設定（コンソールからコピーしたJSON）</div>'
    +'<textarea id="syncCfgIn" style="width:100%;min-height:96px;border:1.5px solid var(--line);border-radius:10px;padding:10px;font-family:inherit;font-size:.85rem" placeholder="{ &quot;apiKey&quot;: ..., &quot;databaseURL&quot;: ..., &quot;projectId&quot;: ... }">'+esc(syncCfg?JSON.stringify(syncCfg.config,null,0):"")+'</textarea>'
    +'<button class="btn-line" style="background:var(--done);color:#fff;border-color:var(--done)" onclick="connectSync(document.getElementById(\'syncCode\').value,document.getElementById(\'syncCfgIn\').value)">この設定で同期する</button>'
    +(syncCfg?'<button class="btn-line" onclick="copySyncBundle()">2台目用に同期コードをコピー</button>':'')
    +'<div class="d" style="margin:12px 0 4px">2台目：1台目でコピーした同期コードを貼り付け</div>'
    +'<textarea id="syncBundleIn" style="width:100%;min-height:60px;border:1.5px solid var(--line);border-radius:10px;padding:10px;font-family:inherit;font-size:.85rem" placeholder="同期コードを貼り付け"></textarea>'
    +'<button class="btn-line" onclick="applyBundle(document.getElementById(\'syncBundleIn\').value)">貼り付けた同期コードで接続</button>'
    +(syncCfg?'<button class="btn-line" onclick="disconnectSync()">同期を解除</button>':'')
    +'<div style="margin-top:18px;font-weight:800;font-size:1rem">バックアップ</div>'
    +'<button class="btn-line" onclick="exportData()">バックアップをコピー</button>'
    +'<button class="btn-line" onclick="importData()">バックアップを読み込む</button>'
    +'<button class="btn-line danger" onclick="resetAll()">すべてのデータを消す</button>'
    +'<button class="btn-line" onclick="closeModal()" style="margin-top:16px">とじる</button>';
  document.getElementById("alertTime").onchange=function(e){S.alertHour=parseInt(e.target.value.split(":")[0],10);save();toast("保存しました");};
  bd.classList.add("open");
}
function closeModal(){document.getElementById("backdrop").classList.remove("open");render();}
function exportData(){const t=JSON.stringify(S);
  if(navigator.clipboard){navigator.clipboard.writeText(t).then(function(){toast("コピーしました");},function(){prompt("コピーしてください",t);});}
  else{prompt("コピーしてください",t);}}
function importData(){const t=prompt("バックアップ文字列を貼り付け");if(!t)return;
  try{S=Object.assign(def(),JSON.parse(t));save();toast("読み込みました");closeModal();}catch(e){toast("読み込めませんでした");}}
function resetAll(){if(confirm("本当にすべて消しますか？")){localStorage.removeItem(KEY);S=def();closeModal();toast("消去しました");}}

let tT;function toast(m){const e=document.getElementById("toast");e.textContent=m;e.classList.add("show");clearTimeout(tT);tT=setTimeout(function(){e.classList.remove("show");},1600);}
document.getElementById("addBtn").onclick=addTask;
document.getElementById("taskIn").addEventListener("keydown",function(e){if(e.key==="Enter")addTask();});
document.getElementById("memo").addEventListener("input",function(e){saveMemo(e.target.value);});
document.getElementById("gear").onclick=openSettings;
document.getElementById("backdrop").onclick=function(e){if(e.target.id==="backdrop")closeModal();};
document.getElementById("prevM").onclick=function(){calView.setMonth(calView.getMonth()-1);renderCalendar();};
document.getElementById("nextM").onclick=function(){calView.setMonth(calView.getMonth()+1);renderCalendar();};
render();
initSync();
</script>
</body>
</html>
